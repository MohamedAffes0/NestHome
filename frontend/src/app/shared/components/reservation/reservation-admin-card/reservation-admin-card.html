<div class="rac" [attr.data-status]="statusMod">

  <!-- Colored strip -->
  <div class="rac__strip"></div>

  <!-- Property image -->
  <img class="rac__img" [src]="mainImage" [alt]="reservation.realEstate?.title ?? 'Bien'" />

  <!-- Corps -->
  <div class="rac__body">

    <!-- Header -->
    <div class="rac__header">
      <div class="rac__property">
        <p class="rac__property-title">{{ reservation.realEstate?.title ?? '—' }}</p>
        <p class="rac__property-addr" *ngIf="reservation.realEstate?.address">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          {{ reservation.realEstate?.address }}
        </p>
      </div>
      <span class="rac__badge">{{ statusLabel }}</span>
    </div>

    <!-- Details -->
    <div class="rac__details">

      <div class="rac__detail">
        <span class="rac__detail-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Client
        </span>
        <span class="rac__detail-val">{{ reservation.clientPhone }}</span>
        <span class="rac__detail-sub">CIN / Passeport : {{ reservation.cinPassport }}</span>
      </div>

      <div class="rac__detail">
        <span class="rac__detail-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Date de visite
        </span>
        <span class="rac__detail-val">{{ formattedDate }}</span>
        <span class="rac__detail-sub">{{ reservation.visitTime }}</span>
      </div>

    </div>

  </div>

  <!-- Actions -->
  <div class="rac__actions">

    <button
      *ngIf="reservation.status === ReservationStatus.PENDING"
      class="rac__btn rac__btn--confirm"
      type="button"
      (click)="confirm.emit()"
    >
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Confirmer
    </button>

    <button
      *ngIf="reservation.status === ReservationStatus.PENDING || reservation.status === ReservationStatus.CONFIRMED"
      class="rac__btn rac__btn--cancel"
      type="button"
      (click)="cancel.emit()"
    >
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Annuler
    </button>

    <button
      class="rac__btn rac__btn--delete"
      type="button"
      (click)="remove.emit()"
      title="Supprimer"
    >
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>

  </div>

</div>
