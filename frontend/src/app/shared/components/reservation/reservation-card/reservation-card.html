<div class="rc" [ngClass]="statusClass">

  <!-- Image -->
  <img class="rc__img" [src]="mainImage" [alt]="reservation.realEstate?.title ?? 'Bien'" />

  <!-- Content -->
  <div class="rc__content">

    <div class="rc__header">
      <div>
        <h3 class="rc__title">{{ reservation.realEstate?.title ?? 'Bien immobilier' }}</h3>
        <p class="rc__address" *ngIf="reservation.realEstate?.address">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          {{ reservation.realEstate?.address }}
        </p>
      </div>
      <span class="rc__status" [ngClass]="statusClass">{{ statusLabel }}</span>
    </div>

    <div class="rc__details">

      <div class="rc__detail">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>{{ formattedDate }}</span>
      </div>

      <div class="rc__detail">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>{{ reservation.visitTime }}</span>
      </div>

      <div class="rc__detail">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>{{ reservation.clientPhone }}</span>
      </div>

    </div>

  </div>

  <!-- Cancel -->
  <button
    *ngIf="canCancel"
    class="rc__cancel"
    type="button"
    (click)="cancel.emit()"
    title="Annuler la réservation"
  >
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    Annuler
  </button>

</div>
