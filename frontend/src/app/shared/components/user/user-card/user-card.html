<div class="uc" [class.uc--inactive]="!user.isActive">

  <!-- Avatar + infos -->
  <div class="uc__header">
    <div class="uc__avatar-wrap">
      <img class="uc__avatar" [src]="avatarUrl" [alt]="user.name" />
      <span class="uc__dot" [class.uc__dot--active]="user.isActive" [title]="user.isActive ? 'Actif' : 'Inactif'"></span>
    </div>

    <div class="uc__info">
      <p class="uc__name">{{ user.name }}</p>
      <p class="uc__email">{{ user.email }}</p>
      <span class="uc__role" [ngClass]="roleBadgeClass">{{ roleLabel }}</span>
    </div>
  </div>

  <!-- Actions -->
  <div class="uc__actions">

    <!-- Role -->
    <div class="uc__field">
      <label class="uc__label">Rôle</label>
      <select
        class="select uc__select"
        [(ngModel)]="selectedRole"
        (ngModelChange)="onRoleChange()"
      >
        <option *ngFor="let r of roles" [value]="r.value">{{ r.label }}</option>
      </select>
    </div>

    <!-- Actif / Inactif -->
    <div class="uc__field">
      <label class="uc__label">Statut</label>
      <button
        class="uc__toggle"
        [class.uc__toggle--active]="user.isActive"
        type="button"
        (click)="toggleActive.emit(!user.isActive)"
      >
        <span class="uc__toggle-dot"></span>
        {{ user.isActive ? 'Actif' : 'Inactif' }}
      </button>
    </div>

    <!-- Delete -->
    <button class="uc__delete" type="button" (click)="delete.emit()" title="Supprimer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>

  </div>

</div>
