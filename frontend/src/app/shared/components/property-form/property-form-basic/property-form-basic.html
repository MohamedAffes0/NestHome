<div class="pfb">

  <!-- ── Title and description ── -->
  <div class="pfb__section">
    <h3 class="pfb__section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Informations générales
    </h3>

    <div class="pfb__fields">

      <div class="field pfb__field--full">
        <label class="label">Titre de l'annonce <span class="pfb__required">*</span></label>
        <input class="input" type="text" placeholder="Ex: Villa moderne avec piscine à La Marsa"
          [(ngModel)]="form.title" name="title" (ngModelChange)="emit()" maxlength="120" />
        <span class="pfb__hint">{{ form.title.length }}/120 caractères</span>
      </div>

      <div class="field pfb__field--full">
        <label class="label">Description <span class="pfb__required">*</span></label>
        <textarea class="input pfb__textarea" rows="5"
          placeholder="Décrivez le bien en détail : environnement, état général, points forts..."
          [(ngModel)]="form.description" name="description" (ngModelChange)="emit()"></textarea>
      </div>

    </div>
  </div>

  <!-- ── Type & Status ── -->
  <div class="pfb__section">
    <h3 class="pfb__section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Type de bien &amp; Statut
    </h3>

    <div class="pfb__fields">

      <div class="field">
        <label class="label">Type <span class="pfb__required">*</span></label>
        <div class="pfb__cards">
          <button *ngFor="let t of types" type="button" class="pfb__card"
            [class.pfb__card--active]="form.type === t.value"
            (click)="setType(t.value)">
            <span class="pfb__card-icon">{{ t.icon }}</span>
            <span class="pfb__card-label">{{ t.label }}</span>
          </button>
        </div>
      </div>

      <div class="field">
        <label class="label">Statut <span class="pfb__required">*</span></label>
        <div class="pfb__status-chips">
          <button *ngFor="let s of statuses" type="button" class="pfb__status-chip"
            [class.pfb__status-chip--active]="form.status === s.value"
            [attr.data-color]="s.color"
            (click)="setStatus(s.value)">
            {{ s.label }}
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Location & Price ── -->
  <div class="pfb__section">
    <h3 class="pfb__section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Localisation &amp; Prix
    </h3>

    <div class="pfb__fields">

      <!-- Address -->
      <div class="field pfb__field--full">
        <label class="label">Adresse / Ville <span class="pfb__required">*</span></label>
        <div class="input-group">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <input class="input" type="text" placeholder="Ex: La Marsa, Tunis"
            [(ngModel)]="form.address" name="address" (ngModelChange)="emit()" />
        </div>
      </div>

      <!-- Latitude -->
      <div class="field">
        <label class="label">
          Latitude <span class="pfb__required">*</span>
          <span class="pfb__coord-hint">Ex: 36.8938</span>
        </label>
        <div class="input-group" [class.input-group--error]="form.lat !== null && (form.lat < -90 || form.lat > 90)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/></svg>
          <input class="input" type="number" placeholder="36.8938" step="0.0001" min="-90" max="90"
            [(ngModel)]="form.lat" name="lat" (ngModelChange)="emit()" />
        </div>
        <span class="pfb__hint" *ngIf="form.lat !== null && (form.lat < -90 || form.lat > 90)" style="color: var(--color-danger)">
          Valeur entre -90 et 90
        </span>
      </div>

      <!-- Longitude -->
      <div class="field">
        <label class="label">
          Longitude <span class="pfb__required">*</span>
          <span class="pfb__coord-hint">Ex: 10.3233</span>
        </label>
        <div class="input-group" [class.input-group--error]="form.lng !== null && (form.lng < -180 || form.lng > 180)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
          <input class="input" type="number" placeholder="10.3233" step="0.0001" min="-180" max="180"
            [(ngModel)]="form.lng" name="lng" (ngModelChange)="emit()" />
        </div>
        <span class="pfb__hint" *ngIf="form.lng !== null && (form.lng < -180 || form.lng > 180)" style="color: var(--color-danger)">
          Valeur entre -180 et 180
        </span>
      </div>

      <!-- Preview coordinates -->
      <div class="pfb__coords-preview pfb__field--full" *ngIf="form.lat !== null && form.lng !== null">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Coordonnées : <strong>{{ form.lat }}, {{ form.lng }}</strong>
        <a [href]="'https://www.google.com/maps?q=' + form.lat + ',' + form.lng" target="_blank" class="pfb__coords-link">
          Vérifier sur Maps
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>

      <!-- Price -->
      <div class="field">
        <label class="label">Prix <span class="pfb__required">*</span></label>
        <div class="input-group">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <input class="input" type="number" placeholder="480 000" min="0"
            [(ngModel)]="form.price" name="price" (ngModelChange)="emit()" />
          <span class="pfb__unit">{{ priceUnit }}</span>
        </div>
      </div>

      <!-- Status -->
      <div class="field">
        <label class="label">État <span class="pfb__required">*</span></label>
        <select class="select" [(ngModel)]="form.condition" name="condition" (ngModelChange)="emit()">
          <option value="">Sélectionner...</option>
          <option *ngFor="let c of conditions" [value]="c">{{ c }}</option>
        </select>
      </div>

    </div>
  </div>

  <!-- ── Characteristics ── -->
  <div class="pfb__section">
    <h3 class="pfb__section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"/><path d="M3 9h18M9 3v18"/></svg>
      Caractéristiques
    </h3>

    <div class="pfb__fields pfb__fields--3">

      <div class="field">
        <label class="label">Chambres <span class="pfb__required">*</span></label>
        <div class="input-group">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          <input class="input" type="number" placeholder="3" min="0" max="50"
            [(ngModel)]="form.rooms" name="rooms" (ngModelChange)="emit()" />
        </div>
      </div>

      <div class="field">
        <label class="label">Salles de bain <span class="pfb__required">*</span></label>
        <div class="input-group">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16M4 6h16M4 18h7"/></svg>
          <input class="input" type="number" placeholder="2" min="0" max="20"
            [(ngModel)]="form.bathroom" name="bathroom" (ngModelChange)="emit()" />
        </div>
      </div>

      <div class="field">
        <label class="label">Surface (m²) <span class="pfb__required">*</span></label>
        <div class="input-group">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"/><path d="M3 9h18M9 3v18"/></svg>
          <input class="input" type="number" placeholder="120" min="1"
            [(ngModel)]="form.surface" name="surface" (ngModelChange)="emit()" />
          <span class="pfb__unit">m²</span>
        </div>
      </div>

    </div>
  </div>

</div>
