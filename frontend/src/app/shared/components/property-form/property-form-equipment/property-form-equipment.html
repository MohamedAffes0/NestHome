<div class="pfe">

  <div class="pfe__section">
    <h3 class="pfe__section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Équipements &amp; Services
    </h3>

    <div class="pfe__body">

      <!-- Added Tags -->
      <div class="pfe__added" *ngIf="equipment.length > 0">
        <p class="pfe__sub-label">Équipements sélectionnés ({{ equipment.length }})</p>
        <div class="pfe__tags">
          <span class="pfe__tag" *ngFor="let item of equipment">
            {{ item }}
            <button type="button" class="pfe__tag-remove" (click)="remove(item)" aria-label="Supprimer">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </span>
        </div>
      </div>

      <!-- Fast suggestions -->
      <div>
        <p class="pfe__sub-label">Suggestions rapides</p>
        <div class="pfe__suggestions">
          <button
            *ngFor="let s of availableSuggestions"
            type="button"
            class="pfe__suggestion"
            (click)="addSuggestion(s)"
          >
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            {{ s }}
          </button>
        </div>
      </div>

      <!-- Add Custom Equipment -->
      <div class="field">
        <label class="label">Ajouter un équipement personnalisé</label>
        <div class="input-group">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <input class="input" type="text" placeholder="Ex: Sauna, Jacuzzi..."
            [(ngModel)]="newItem" name="newEquip"
            (keydown)="onKeydown($event)" />
          <button type="button" class="btn btn-primary pfe__add-btn" (click)="addCustom()" [disabled]="!newItem.trim()">
            Ajouter
          </button>
        </div>
      </div>

    </div>
  </div>

</div>
