<div class="profile-section">

  <!-- Header danger -->
  <div class="profile-danger-header">
    <div class="profile-danger-header__icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-triangle-alert-icon lucide-triangle-alert"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
    </div>
    <div>
      <p class="profile-danger-header__title">Supprimer le compte</p>
      <p class="profile-danger-header__sub">Action irréversible — procédez avec précaution</p>
    </div>
  </div>

  <div class="profile-danger-body">

    <!-- Warning -->
    <app-alert
      type="warning"
      message="La suppression de votre compte est définitive. Toutes vos annonces, favoris, messages et données personnelles seront supprimés immédiatement et ne pourront pas être récupérés."
    />

    <!-- Error -->
    <div class="profile-alerts">
      <app-alert type="error" [message]="errorMsg" />
    </div>

    <!-- Confirmation email -->
    <div class="profile-danger-confirm field">
      <label class="label">
        Tapez votre email pour confirmer
        <span>( {{ currentUser?.email }} )</span>
      </label>
      <div class="input-group">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input
          class="input"
          type="email"
          [placeholder]="currentUser?.email ?? 'votre@email.com'"
          [(ngModel)]="confirmText"
          name="deleteConfirm"
        />
      </div>
    </div>

    <!-- Footer -->
    <div class="profile-danger-footer">
      <p class="profile-danger-footer__hint">Cette action ne peut pas être annulée.</p>
      <button
        class="btn-delete"
        type="button"
        [disabled]="!confirmMatch || isLoading"
        (click)="onDelete()"
      >
        <span class="auth-spinner" *ngIf="isLoading"></span>
        <svg *ngIf="!isLoading" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        {{ isLoading ? 'Suppression...' : 'Supprimer définitivement' }}
      </button>
    </div>

  </div>
</div>
