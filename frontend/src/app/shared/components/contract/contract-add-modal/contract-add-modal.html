<div class="cam-overlay" (click)="onOverlayClick()">
  <div class="cam" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="cam__header">
      <h2 class="cam__title">Nouveau contrat</h2>
      <button class="cam__close" type="button" (click)="close.emit()" [disabled]="creating">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Body -->
    <div class="cam__body">

      <!-- ── RealEstate ── -->
      <div class="cam__field">
        <label class="cam__label">Bien immobilier <span class="cam__req">*</span></label>

        <div class="cam__autocomplete">
          <div class="cam__input-wrap">
            <input
              class="cam__input"
              type="text"
              placeholder="Rechercher un bien disponible…"
              [value]="reSearch"
              (input)="onRESearch($any($event.target).value)"
            />
            <button *ngIf="selectedRE" class="cam__clear" type="button" (click)="clearRE()">×</button>
          </div>

          <div class="cam__dropdown" *ngIf="!selectedRE && filteredRE.length > 0">
            <div class="cam__dropdown-item" *ngFor="let re of filteredRE" (click)="selectRE(re)">
              <img class="cam__dropdown-img"
                [src]="re.images[0] || 'assets/images/default-property.jpg'"
                [alt]="re.title" />
              <div class="cam__dropdown-info">
                <span class="cam__dropdown-title">{{ re.title }}</span>
                <span class="cam__dropdown-sub">{{ re.address }}</span>
              </div>
              <span class="cam__badge"
                    [class.cam__badge--rental]="re.status === 1"
                    [class.cam__badge--sale]="re.status === 0">
                {{ reStatusLabel(re) }}
              </span>
            </div>
          </div>
        </div>

        <!-- Selected RealEstate -->
        <div class="cam__selected" *ngIf="selectedRE">
          <img class="cam__selected-img"
            [src]="selectedRE.images[0] || 'assets/images/default-property.jpg'"
            [alt]="selectedRE.title" />
          <div>
            <p class="cam__selected-title">{{ selectedRE.title }}</p>
            <p class="cam__selected-sub">{{ selectedRE.address }} · {{ selectedRE.price | number }} DT</p>
          </div>
          <span class="cam__badge cam__badge--lg"
                [class.cam__badge--rental]="isRentalSelected"
                [class.cam__badge--sale]="!isRentalSelected">
            Contrat de {{ isRentalSelected ? 'location' : 'vente' }}
          </span>
        </div>
      </div>

      <!-- ── Client ── -->
      <div class="cam__field">
        <label class="cam__label">Client <span class="cam__req">*</span></label>

        <div class="cam__autocomplete">
          <div class="cam__input-wrap">
            <input
              class="cam__input"
              type="text"
              placeholder="Rechercher un client…"
              [value]="userSearch"
              (input)="onUserSearch($any($event.target).value)"
            />
            <button *ngIf="selectedUser" class="cam__clear" type="button" (click)="clearUser()">×</button>
          </div>

          <div class="cam__dropdown"
               *ngIf="!selectedUser && filteredUsers.length > 0 && userSearch.length > 0">
            <div class="cam__dropdown-item"
                 *ngFor="let u of filteredUsers | slice:0:6"
                  (click)="selectUser(u)">
              <img class="cam__dropdown-avatar" [src]="userAvatar(u)" [alt]="u.name" />
              <div class="cam__dropdown-info">
                <span class="cam__dropdown-title">{{ u.name }}</span>
                <span class="cam__dropdown-sub">{{ u.email }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── CIN / Passeport ── -->
      <div class="cam__field">
        <label class="cam__label">CIN / Passeport <span class="cam__req">*</span></label>
        <input
          class="cam__input"
          type="text"
          placeholder="ex: 12345678 ou AB1234567"
          [(ngModel)]="form.cinPassport"
          maxlength="20"
        />
      </div>

      <!-- ── Dates ── -->
      <div class="cam__row">
        <div class="cam__field">
          <label class="cam__label">Date de début <span class="cam__req">*</span></label>
          <input class="cam__input" type="date" [(ngModel)]="form.startDate" />
        </div>
        <div class="cam__field" *ngIf="isRentalSelected">
          <label class="cam__label">Date de fin <span class="cam__req">*</span></label>
          <input class="cam__input" type="date" [(ngModel)]="form.endDate" [min]="form.startDate" />
        </div>
      </div>

      <!-- Error -->
      <p class="cam__error" *ngIf="error">{{ error }}</p>

    </div>

    <!-- Footer -->
    <div class="cam__footer">
      <button class="btn btn-ghost" type="button" (click)="close.emit()" [disabled]="creating">
        Annuler
      </button>
      <button class="btn btn-primary" type="button" [disabled]="!canCreate || creating" (click)="submit()">
        <svg *ngIf="creating" class="cam__spinner" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        {{ creating ? 'Création…' : 'Créer le contrat' }}
      </button>
    </div>

  </div>
</div>
