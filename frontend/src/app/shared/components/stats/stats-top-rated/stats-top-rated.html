<div class="tr-wrap">

  <div class="tr-header">
    <h3 class="tr-title">Biens les mieux notés</h3>
    <p class="tr-sub">{{ items.length }} bien{{ items.length > 1 ? 's' : '' }}</p>
  </div>

  <!-- Empty -->
  <div class="tr-empty" *ngIf="items.length === 0">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    <p>Aucun avis enregistré.</p>
  </div>

  <!-- List -->
  <div class="tr-list" *ngIf="items.length > 0">
    <div class="tr-item" *ngFor="let item of items; let i = index">

      <!-- Rank -->
      <div class="tr-item__rank" [style.background]="rankColor(i) + '22'" [style.color]="rankColor(i)">
        <span *ngIf="i < 3">
          <svg width="14" height="14" viewBox="0 0 24 24" [attr.fill]="rankColor(i)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </span>
        <span *ngIf="i >= 3" class="tr-item__rank-num">{{ i + 1 }}</span>
      </div>

      <!-- Info -->
      <div class="tr-item__info">
        <p class="tr-item__title">{{ item.title }}</p>
        <div class="tr-item__stars">
          <svg *ngFor="let s of stars(item.avgRating)" width="11" height="11" viewBox="0 0 24 24" [attr.fill]="s.full ? '#d4a017' : '#e2e6ee'" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span class="tr-item__comments">{{ item.totalComments }} avis</span>
        </div>
      </div>

      <!-- Score -->
      <div class="tr-item__score">
        {{ item.avgRating.toFixed(1) }}
      </div>

    </div>
  </div>

</div>
