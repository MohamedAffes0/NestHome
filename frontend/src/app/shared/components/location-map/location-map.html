<div class="lm-wrap">

  <!-- Header -->
  <div class="lm-header" *ngIf="location?.label || location?.address">
    <div class="lm-header__info">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color: var(--gold-500); flex-shrink:0; margin-top:2px"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <div>
        <p class="lm-header__label" *ngIf="location?.label">{{ location.label }}</p>
        <p class="lm-header__addr"  *ngIf="location?.address">{{ location.address }}</p>
      </div>
    </div>
    <button class="lm-btn" type="button" (click)="openInMaps()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Voir sur Maps
    </button>
  </div>

  <!-- Carte iframe -->
  <iframe
    [src]="mapUrl"
    [style.height]="height"
    class="lm-iframe"
    frameborder="0"
    scrolling="no"
    allowfullscreen
    loading="lazy"
    title="Localisation"
  ></iframe>

</div>
