<div class="pam-overlay" (click)="onOverlayClick()">
  <div class="pam" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="pam__header">
      <h2 class="pam__title">Nouveau paiement</h2>
      <button class="pam__close" type="button" (click)="close.emit()" [disabled]="loading">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Body -->
    <div class="pam__body">

      <!-- ── Real Estate ── -->
      <div class="field">
        <label class="label">Bien immobilier <span class="pam__req">*</span></label>

        <!-- Selected Pill -->
        <div class="pam__pill" *ngIf="selectedProperty">
          <img class="pam__pill-img" [src]="propertyImage(selectedProperty)" alt="" />
          <span class="pam__pill-label">{{ selectedProperty.title }}</span>
          <button class="pam__pill-clear" type="button" (click)="clearProperty()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- Search + dropdown -->
        <div class="pam__autocomplete" *ngIf="!selectedProperty">
          <div class="input-group">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="input" type="text" placeholder="Rechercher un bien..."
              [(ngModel)]="propertySearch" (input)="onPropertySearch()" />
          </div>
          <div class="pam__dropdown" *ngIf="propertyResults.length > 0">
            <div class="pam__dropdown-item" *ngFor="let p of propertyResults" (click)="selectProperty(p)">
              <img class="pam__dropdown-img" [src]="propertyImage(p)" alt="" />
              <div class="pam__dropdown-info">
                <span class="pam__dropdown-name">{{ p.title }}</span>
                <span class="pam__dropdown-sub">{{ p.address }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Client ── -->
      <div class="field">
        <label class="label">Client <span class="pam__req">*</span></label>

        <!-- Selected Pill -->
        <div class="pam__pill" *ngIf="selectedUser">
          <img class="pam__pill-img pam__pill-img--round" [src]="userAvatar(selectedUser)" alt="" />
          <span class="pam__pill-label">{{ selectedUser.name }} — {{ selectedUser.email }}</span>
          <button class="pam__pill-clear" type="button" (click)="clearUser()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- Search + dropdown -->
        <div class="pam__autocomplete" *ngIf="!selectedUser">
          <div class="input-group">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input class="input" type="text" placeholder="Rechercher un client..."
              [(ngModel)]="userSearch" (input)="onUserSearch()" />
          </div>
          <div class="pam__dropdown" *ngIf="userResults.length > 0">
            <div class="pam__dropdown-item" *ngFor="let u of userResults" (click)="selectUser(u)">
              <img class="pam__dropdown-img pam__dropdown-img--round" [src]="userAvatar(u)" alt="" />
              <div class="pam__dropdown-info">
                <span class="pam__dropdown-name">{{ u.name }}</span>
                <span class="pam__dropdown-sub">{{ u.email }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Amount ── -->
      <div class="field">
        <label class="label">Montant (DT) <span class="pam__req">*</span></label>
        <div class="input-group">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <input class="input" type="number" placeholder="0.00" min="0" step="0.01" [(ngModel)]="amount" />
          <span class="pam__unit">DT</span>
        </div>
      </div>

      <app-alert *ngIf="error" type="error" [message]="error" />
    </div>

    <!-- Footer -->
    <div class="pam__footer">
      <button class="btn btn-ghost" type="button" (click)="close.emit()" [disabled]="loading">
        Annuler
      </button>
      <button class="btn btn-primary" type="button" [disabled]="!canSubmit || loading" (click)="submit()">
        <span class="auth-spinner" *ngIf="loading"></span>
        <svg *ngIf="!loading" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        {{ loading ? 'Enregistrement…' : 'Enregistrer' }}
      </button>
    </div>

  </div>
</div>
