<div class="gc">
  <img class="gc__img" [src]="mainImage" [alt]="property.title" />

  <div class="gc__content">
    <div class="gc__top">
      <span class="badge" [ngClass]="isSale ? 'badge-sale' : 'badge-rent'">{{ statusLabel }}</span>
      <span class="gc__type">{{ typeLabel }}</span>
    </div>

    <h3 class="gc__title">{{ property.title }}</h3>

    <p class="gc__address">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      {{ property.address }}
    </p>

    <p class="gc__price">
      {{ property.price | number:'1.0-0' }}
      <span>{{ isSale ? 'DT' : 'DT/mois' }}</span>
    </p>
  </div>

  <div class="gc__actions">
    <button class="gc__btn gc__btn--edit" type="button" (click)="edit.emit()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Modifier
    </button>

    <button class="gc__btn gc__btn--delete" type="button" (click)="delete.emit()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      Supprimer
    </button>
  </div>
</div>
