<div class="auth-page">
  <!-- Left panel (decoration) -->
  <app-auth-visual
    imageUrl="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=900&q=80"
    quote='"Votre prochain chez-vous commence ici."'
  />

  <!-- Right panel (form) -->
  <div class="auth-form-panel">
    <div class="auth-form-wrap">

      <!-- Logo mobile -->
      <a class="auth-logo auth-logo--mobile" routerLink="/">
        <div class="auth-logo__icon">
          <svg width="18" height="18" viewBox="0 0 28 28" fill="none"><path d="M14 3L3 12V25H10V17H18V25H25V12L14 3Z" fill="currentColor" /><circle cx="14" cy="14" r="3" fill="white" opacity="0.5" /></svg>
        </div>
        <span class="auth-logo__text">Nest<em>Home</em></span>
      </a>

      <h1 class="auth-title">Bon retour 👋</h1>
      <p class="auth-subtitle">Connectez-vous à votre compte NestHome.</p>

      <!-- Error -->
      <div class="auth-alert" *ngIf="errorMessage">
        <app-alert type="error" [message]="errorMessage" class="auth-alert-wrap" />
      </div>

      <!-- Form -->
      <form class="auth-form" (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

        <!-- Email -->
        <div class="field">
          <label class="label" for="email">Adresse e-mail</label>
          <div
            class="input-group"
            [class.input-group--error]="emailField.invalid && emailField.touched"
            [class.input-group--success]="emailField.valid && emailField.touched"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input
              id="email"
              class="input"
              type="email"
              placeholder="vous@exemple.com"
              [(ngModel)]="form.email"
              name="email"
              #emailField="ngModel"
              autocomplete="email"
              required
              email
            />
            <!-- Sucess Icon -->
            <svg *ngIf="emailField.valid && emailField.touched"class="field-icon field-icon--ok"width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            <!-- Error Icon -->
            <svg *ngIf="emailField.invalid && emailField.touched" class="field-icon field-icon--err" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-slash-icon lucide-circle-slash"><circle cx="12" cy="12" r="10"/><line x1="9" x2="15" y1="15" y2="9"/></svg>
          </div>
          <!-- Error message mail -->
          <div class="field-errors" *ngIf="emailField.invalid && emailField.touched">
            <span *ngIf="emailField.errors?.['required']" class="field-error">
              L'adresse e-mail est obligatoire.
            </span>
            <span *ngIf="emailField.errors?.['email']" class="field-error">
              Veuillez entrer une adresse e-mail valide.
            </span>
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <div class="auth-label-row">
            <label class="label" for="password">Mot de passe</label>
            <a class="auth-forgot" routerLink="/forgot-password">Mot de passe oublié ?</a>
          </div>
          <div
            class="input-group"
            [class.input-group--error]="passwordField.invalid && passwordField.touched"
            [class.input-group--success]="passwordField.valid && passwordField.touched"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input
              id="password"
              class="input"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="••••••••"
              [(ngModel)]="form.password"
              name="password"
              #passwordField="ngModel"
              autocomplete="current-password"
              required
              minlength="8"
            />
            <!-- Toggle show/hide -->
            <button type="button" class="input-clear" (click)="togglePassword()" aria-label="Afficher le mot de passe">
              <svg *ngIf="!showPassword" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg *ngIf="showPassword" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <!-- Error message password -->
          <div class="field-errors" *ngIf="passwordField.invalid && passwordField.touched">
            <span *ngIf="passwordField.errors?.['required']" class="field-error">
              Le mot de passe est obligatoire.
            </span>
            <span *ngIf="passwordField.errors?.['minlength']" class="field-error">
              Le mot de passe doit contenir au moins 8 caractères.
            </span>
          </div>
        </div>

        <!-- Remember me -->
        <label class="auth-remember">
          <input type="checkbox" [(ngModel)]="form.remember" name="remember" />
          <span>Se souvenir de moi</span>
        </label>

        <!-- Submit -->
        <button
          type="submit"
          class="btn btn-primary auth-submit"
          [class.auth-submit--loading]="isLoading"
          [disabled]="isLoading"
        >
          <svg *ngIf="!isLoading" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          <span class="auth-spinner" *ngIf="isLoading"></span>
          {{ isLoading ? 'Connexion...' : 'Se connecter' }}
        </button>

      </form>

      <div class="auth-divider" role="separator" aria-label="Ou">
        <span>ou</span>
      </div>

      <button type="button" class="btn auth-social-btn" (click)="onGoogleSignIn()" [disabled]="isLoading">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.54-.2-2.27H12v4.3h6.46a5.53 5.53 0 0 1-2.4 3.62v3h3.88c2.27-2.09 3.55-5.18 3.55-8.65z"/>
          <path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.94-2.9l-3.88-3c-1.08.73-2.47 1.17-4.06 1.17-3.12 0-5.77-2.11-6.71-4.95H1.29v3.1A11.99 11.99 0 0 0 12 24z"/>
          <path fill="#FBBC05" d="M5.29 14.32a7.18 7.18 0 0 1 0-4.64v-3.1H1.29a12 12 0 0 0 0 10.84l4-3.1z"/>
          <path fill="#EA4335" d="M12 4.77c1.76 0 3.34.6 4.58 1.77l3.43-3.43A11.49 11.49 0 0 0 12 0 12 12 0 0 0 1.29 6.58l4 3.1C6.23 6.88 8.88 4.77 12 4.77z"/>
        </svg>
        Continuer avec Google
      </button>

      <p class="auth-switch">
        Pas encore de compte ?
        <a routerLink="/signup" class="auth-switch__link">S'inscrire</a>
      </p>

    </div>
  </div>
</div>
