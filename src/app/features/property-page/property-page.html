<div class="pp-page" *ngIf="!loading && property ">
  <div class="container">

    <!-- ── Breadcrumb ── -->
    <nav class="pp-breadcrumb">
      <button class="pp-back" type="button" (click)="goBack()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Retour au catalogue
      </button>
      <span class="pp-breadcrumb__sep">›</span>
      <span class="pp-breadcrumb__current">{{ property.title }}</span>
    </nav>

    <!-- ── Grid ── -->
    <div class="pp-grid">

      <!-- ── Main column ── -->
      <div class="pp-main">

        <!-- Image gallery -->
        <app-property-gallery
          [images]="property.images"
          [title]="property.title"
        />

        <!-- Details -->
        <app-property-details [property]="property" />

        <!-- Location -->
        <div class="pp-section" *ngIf="mapLocation">
          <h2 class="pp-section-title">Localisation</h2>
          <app-location-map
            [location]="mapLocation"
            [height]="'300px'"
            [zoom]="15"
          />
        </div>

        <!-- Comments -->
        <app-property-comments
          [comments]="comments"
          [isLoggedIn]="!!currentUser"
          (submitted)="onCommentSubmit($event)"
          [errorMsg]="commentError"
        />

      </div>

      <!-- ── Sidebar ── -->
      <aside class="pp-sidebar">

        <!-- Agent card -->
        <app-property-agent-card
          *ngIf="property.agent"
          [agent]="property.agent"
        />

        <!-- Reservation -->
        <app-property-reservation
          #reservationRef
          [propertyTitle]="property.title"
          [isLoggedIn]="!!currentUser"
          (submitted)="onReservationSubmit($event)"
          [infoMsg]="isAvailable(property) ? '' : 'Ce bien n\'est pas disponible à la réservation.'"
        />

      </aside>
    </div>

  </div>
</div>

<!-- Error -->
<div class="pp-loading" *ngIf="!loading && errorMsg">
  <div class="container" style="padding-top: 4rem; text-align: center; color: var(--color-danger);">
    <p style="font-size: var(--text-lg);">{{ errorMsg }}</p>
    <button class="btn btn-primary" style="margin-top: 1rem;" (click)="goBack()">Retour au catalogue</button>
  </div>
</div>

<!-- Skeleton loading -->
<div class="pp-loading" *ngIf="loading">
  <div class="container">
    <div class="pp-skeleton pp-skeleton--breadcrumb"></div>
    <div class="pp-skeleton pp-skeleton--gallery"></div>
    <div class="pp-skeleton pp-skeleton--details"></div>
  </div>
</div>
