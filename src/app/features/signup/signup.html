<div class="auth-page">

  <!-- Left panel (decoration) -->
  <app-auth-visual
    imageUrl="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=900&q=80"
    quote='"Rejoignez des milliers de familles qui ont trouvé leur nid idéal."'
  />

  <!-- Right panel (form) -->
  <div class="auth-form-panel">
    <div class="auth-form-wrap">

      <!-- Logo mobile -->
      <a class="auth-logo auth-logo--mobile" routerLink="/">
        <div class="auth-logo__icon">
          <svg width="18" height="18" viewBox="0 0 28 28" fill="none"><path d="M14 3L3 12V25H10V17H18V25H25V12L14 3Z" fill="currentColor"/><circle cx="14" cy="14" r="3" fill="white" opacity="0.5"/></svg>
        </div>
        <span class="auth-logo__text">Nest<em>Home</em></span>
      </a>

      <h1 class="auth-title">Créer un compte ✨</h1>
      <p class="auth-subtitle">Rejoignez NestHome et trouvez votre bien idéal.</p>

      <!-- Error -->
      <div class="auth-alert" *ngIf="errorMessage">
        <app-alert type="error" [message]="errorMessage" class="auth-alert-wrap" />
      </div>

      <!-- Form -->
      <form class="auth-form" (ngSubmit)="onSubmit()" novalidate>

        <!-- Name, Lastname -->
        <div class="auth-row">
          <div class="field">
            <label class="label" for="firstName">Prénom</label>
            <input
              id="firstName"
              class="input"
              type="text"
              placeholder="Mohamed"
              [(ngModel)]="form.firstName"
              name="firstName"
              required
            />
          </div>
          <div class="field">
            <label class="label" for="lastName">Nom</label>
            <input
              id="lastName"
              class="input"
              type="text"
              placeholder="Affes"
              [(ngModel)]="form.lastName"
              name="lastName"
              required
            />
          </div>
        </div>

        <!-- Email -->
        <div class="field">
          <label class="label" for="email">Adresse e-mail</label>
          <div class="input-group">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input
              id="email"
              class="input"
              type="email"
              placeholder="vous@exemple.com"
              [(ngModel)]="form.email"
              name="email"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label class="label" for="password">Mot de passe</label>
          <div class="input-group">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input
              id="password"
              class="input"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="••••••••"
              [(ngModel)]="form.password"
              name="password"
              required
            />
            <button type="button" class="input-clear" (click)="togglePassword()">
              <svg *ngIf="!showPassword" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg *ngIf="showPassword"  width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <!-- Password strength -->
          <app-password-strength [password]="form.password" />
        </div>

        <!-- Confirm password -->
        <div class="field">
          <label class="label" for="confirm">Confirmer le mot de passe</label>
          <div class="input-group" [class.input-group--error]="form.confirm && form.password !== form.confirm">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
            <input
              id="confirm"
              class="input"
              [type]="showConfirm ? 'text' : 'password'"
              placeholder="••••••••"
              [(ngModel)]="form.confirm"
              name="confirm"
              required
            />
            <button type="button" class="input-clear" (click)="toggleConfirm()">
              <svg *ngIf="!showConfirm" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg *ngIf="showConfirm"  width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <span class="auth-field-error" *ngIf="form.confirm && form.password !== form.confirm">
            Les mots de passe ne correspondent pas.
          </span>
        </div>

        <!-- CGU -->
        <label class="auth-remember">
          <input type="checkbox" [(ngModel)]="form.terms" name="terms" required />
          <span>J'accepte les <a routerLink="/terms" class="auth-switch__link">conditions d'utilisation</a></span>
        </label>

        <!-- Submit -->
        <button
          type="submit"
          class="btn btn-primary auth-submit"
          [class.auth-submit--loading]="isLoading"
          [disabled]="isLoading"
        >
          <svg *ngIf="!isLoading" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          <span class="auth-spinner" *ngIf="isLoading"></span>
          {{ isLoading ? 'Création...' : 'Créer mon compte' }}
        </button>

      </form>

      <div class="auth-divider" role="separator" aria-label="Ou">
        <span>ou</span>
      </div>

      <button type="button" class="btn auth-social-btn" (click)="onGoogleSignIn()" [disabled]="isLoading">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.54-.2-2.27H12v4.3h6.46a5.53 5.53 0 0 1-2.4 3.62v3h3.88c2.27-2.09 3.55-5.18 3.55-8.65z"/>
          <path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.94-2.9l-3.88-3c-1.08.73-2.47 1.17-4.06 1.17-3.12 0-5.77-2.11-6.71-4.95H1.29v3.1A11.99 11.99 0 0 0 12 24z"/>
          <path fill="#FBBC05" d="M5.29 14.32a7.18 7.18 0 0 1 0-4.64v-3.1H1.29a12 12 0 0 0 0 10.84l4-3.1z"/>
          <path fill="#EA4335" d="M12 4.77c1.76 0 3.34.6 4.58 1.77l3.43-3.43A11.49 11.49 0 0 0 12 0 12 12 0 0 0 1.29 6.58l4 3.1C6.23 6.88 8.88 4.77 12 4.77z"/>
        </svg>
        Continuer avec Google
      </button>

      <p class="auth-switch">
        Déjà un compte ?
        <a routerLink="/login" class="auth-switch__link">Se connecter</a>
      </p>

    </div>
  </div>

</div>
