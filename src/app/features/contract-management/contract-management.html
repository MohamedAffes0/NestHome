<section class="cm">
  <div class="container">

    <!-- ── Header ─────────────────────────────────── -->
    <div class="cm__header">
      <div>
        <span class="section-eyebrow">Management</span>
        <h1 class="section-title">Gestion des contrats</h1>
      </div>
      <button class="btn btn-primary cm__btn-new" type="button" (click)="showAddModal = true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouveau contrat
      </button>
    </div>

    <!-- ── Unpaid Contracts ──────────────────────── -->
    <app-unpaid-contracts
      [sale]="unpaidSale"
      [rental]="unpaidRental"
      [loading]="unpaidLoading"
      style="display:block; margin-bottom: var(--space-6);"
    />

    <!-- ── Stats ──────────────────────────────────── -->
    <div class="cm__stats">
      <div class="cm__stat">
        <span class="cm__stat-value">{{ allContracts.length }}</span>
        <span class="cm__stat-label">Total</span>
      </div>
      <div class="cm__stat">
        <span class="cm__stat-value cm__stat-value--sale">{{ totalSales }}</span>
        <span class="cm__stat-label">Ventes</span>
      </div>
      <div class="cm__stat">
        <span class="cm__stat-value cm__stat-value--rental">{{ totalRentals }}</span>
        <span class="cm__stat-label">Locations</span>
      </div>
    </div>

    <!-- ── Flash ──────────────────────────────────── -->
    <div class="cm__flash"
          [class.cm__flash--success]="flashType === 'success'"
          [class.cm__flash--error]="flashType === 'error'"
         *ngIf="flashMsg">
      {{ flashMsg }}
    </div>

    <!-- ── Toolbar ─────────────────────────────────── -->
    <div class="cm__toolbar">
      <div class="cm__search-wrap">
        <svg class="cm__search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          class="cm__search"
          type="text"
          placeholder="Rechercher un bien, client ou CIN…"
          [value]="searchQuery"
          (input)="onSearchInput($any($event.target).value)"
        />
      </div>
      <div class="cm__filters">
        <button class="cm__filter-btn" [class.active]="filterType === 'all'"    type="button" (click)="setFilter('all')">Tous</button>
        <button class="cm__filter-btn cm__filter-btn--sale"   [class.active]="filterType === 'sale'"   type="button" (click)="setFilter('sale')">Ventes</button>
        <button class="cm__filter-btn cm__filter-btn--rental" [class.active]="filterType === 'rental'" type="button" (click)="setFilter('rental')">Locations</button>
      </div>
    </div>

    <!-- ── Loading ─────────────────────────────────── -->
    <div class="cm__loading" *ngIf="loading">
      <div class="spinner"></div>
      <span>Chargement des contrats…</span>
    </div>

    <!-- ── Empty ───────────────────────────────────── -->
    <div class="cm__empty" *ngIf="!loading && filtered.length === 0">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <p>Aucun contrat trouvé.</p>
    </div>

    <!-- ── List ────────────────────────────────────── -->
    <div class="cm__list" *ngIf="!loading && pagedContracts.length > 0">
      <app-contract-card
        *ngFor="let c of pagedContracts"
        [contract]="c"
        (delete)="contractToDelete = c"
      />
    </div>

    <!-- ── Pagination ──────────────────────────────── -->
    <app-pagination
      *ngIf="!loading && filtered.length > 0"
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      [totalItems]="filtered.length"
      [itemsPerPage]="pageSize"
      (pageChange)="goToPage($event)"
    />

  </div>
</section>

<!-- ── Modal Add ── -->
<app-contract-add-modal
  *ngIf="showAddModal"
  (close)="showAddModal = false"
  (created)="onContractCreated($event)"
/>

<!-- ── Modal Delete ── -->
<app-confirm-delete-modal
  *ngIf="contractToDelete"
  title="Supprimer le contrat"
  [message]="deleteMessage"
  [loading]="deleteLoading"
  (close)="contractToDelete = null"
  (confirm)="confirmDelete()"
/>
