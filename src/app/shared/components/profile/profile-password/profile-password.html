<div class="profile-section">
  <div class="profile-section__head">
    <h3 class="profile-section__title">Changer le mot de passe</h3>
    <p class="profile-section__sub">Choisissez un mot de passe fort et unique</p>
  </div>

  <div class="profile-alerts">
    <app-alert type="success" [message]="successMsg" />
    <app-alert type="error"   [message]="errorMsg"   />
  </div>

  <form class="profile-form" (ngSubmit)="onSubmit()" novalidate>

    <!-- Current Password -->
    <div class="field">
      <label class="label">Mot de passe actuel</label>
      <div class="input-group">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input class="input" [type]="showCurrent ? 'text' : 'password'" placeholder="••••••••"
          [(ngModel)]="form.current" name="current" required />
        <button type="button" class="input-clear" (click)="showCurrent = !showCurrent">
          <svg *ngIf="!showCurrent" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg *ngIf="showCurrent"  width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <!-- New Password -->
    <div class="field">
      <label class="label">Nouveau mot de passe</label>
      <div class="input-group">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input class="input" [type]="showNext ? 'text' : 'password'" placeholder="••••••••"
          [(ngModel)]="form.next" name="next" required />
        <button type="button" class="input-clear" (click)="showNext = !showNext">
          <svg *ngIf="!showNext" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg *ngIf="showNext"  width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <app-password-strength [password]="form.next" />
    </div>

    <!-- Confirm New Password -->
    <div class="field">
      <label class="label">Confirmer le nouveau mot de passe</label>
      <div class="input-group" [class.input-group--error]="form.confirm && form.next !== form.confirm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
        <input class="input" [type]="showConfirm ? 'text' : 'password'" placeholder="••••••••"
          [(ngModel)]="form.confirm" name="confirm" required />
        <button type="button" class="input-clear" (click)="showConfirm = !showConfirm">
          <svg *ngIf="!showConfirm" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg *ngIf="showConfirm"  width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <span class="field-error" *ngIf="form.confirm && form.next !== form.confirm">
        Les mots de passe ne correspondent pas.
      </span>
    </div>

    <div class="profile-form__footer">
      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        <span class="auth-spinner" *ngIf="isLoading"></span>
        <svg *ngIf="!isLoading" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        {{ isLoading ? 'Modification...' : 'Modifier le mot de passe' }}
      </button>
    </div>

  </form>
</div>
