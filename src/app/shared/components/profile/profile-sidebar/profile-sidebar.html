<aside class="profile-sidebar">

  <!-- User card -->
  <div class="profile-card">
    <div class="profile-avatar-wrap">
      <img class="profile-avatar" [src]="getAvatar()" [alt]="currentUser?.name ?? 'Avatar'" />
      <!-- Label to trigger the hidden input -->
      <label class="profile-avatar__edit" for="sidebarAvatarInput" title="Changer la photo">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </label>
      <!-- Hidden input for avatar selection -->
      <input
        id="sidebarAvatarInput"
        type="file"
        accept="image/*"
        class="profile-avatar__input-hidden"
        (change)="onSidebarAvatarChange($event)"
      />
    </div>

    <h2 class="profile-name">{{ currentUser?.name ?? '—' }}</h2>
    <span class="profile-role-badge">{{ formatRole(currentUser?.role ?? '') }}</span>
    <p class="profile-email">{{ currentUser?.email ?? '—' }}</p>

    <!-- Bouton delete pic: visible if preview locale or image serveur -->
    <button
      *ngIf="showDeleteButton"
      class="profile-remove-avatar"
      type="button"
      [disabled]="deleteLoading"
      (click)="onDeleteAvatar()"
    >
      <span class="profile-remove-avatar__spinner" *ngIf="deleteLoading"></span>
      <svg *ngIf="!deleteLoading" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      {{ deleteLoading ? 'Suppression...' : 'Supprimer la photo' }}
    </button>

    <!-- Erreur suppression -->
    <app-alert *ngIf="deleteError" type="error" [message]="deleteError" />
  </div>

  <!-- Nav -->
  <nav class="profile-nav">
    <button
      class="profile-nav__item"
      [class.profile-nav__item--active]="activeTab === 'info'"
      (click)="setTab('info')"
    >
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Mes informations
    </button>

    <button
      class="profile-nav__item"
      [class.profile-nav__item--active]="activeTab === 'password'"
      (click)="setTab('password')"
    >
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Mot de passe
    </button>

    <button
      class="profile-nav__item profile-nav__item--danger"
      [class.profile-nav__item--active]="activeTab === 'danger'"
      (click)="setTab('danger')"
    >
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Supprimer le compte
    </button>
  </nav>

</aside>
