<div class="pc">

  <!-- ══ Global rating ══ -->
  <div class="pc__header">
    <div class="pc__header-left">
      <h2 class="pc__title">Avis clients</h2>
      <span class="pc__total">{{ comments.length }} avis</span>
    </div>

    <div class="pc__global" *ngIf="comments.length > 0">
      <span class="pc__global-score">{{ avgRating.toFixed(1) }}</span>
      <div class="pc__global-right">
        <div class="pc__stars">
          <svg *ngFor="let s of stars" width="14" height="14" viewBox="0 0 24 24"
            [class]="'pc__star pc__star--' + starFill(s, avgRating)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </div>
        <span class="pc__global-label">{{ ratingLabel }}</span>
      </div>
    </div>
  </div>

  <!-- ══ Form ══ -->
  <div class="pc__form-wrap">
    <!-- Not connected -->
    <app-alert *ngIf="!isLoggedIn" type="info" message="Connectez-vous pour laisser un avis." />

    <form class="pc__form" *ngIf="isLoggedIn" (ngSubmit)="onSubmit()" novalidate>
      <h3 class="pc__form-title">Votre avis</h3>

      <!-- Stars -->
      <div class="pc__form-stars">
        <button
          *ngFor="let s of stars"
          type="button"
          class="pc__form-star"
          [class.pc__form-star--active]="s <= (hovered || form.rating)"
          (mouseenter)="hovered = s"
          (mouseleave)="hovered = 0"
          (click)="form.rating = s"
        >
          <svg width="28" height="28" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </button>
        <span class="pc__form-label" *ngIf="hovered || form.rating">
          {{ ['','Insuffisant','Passable','Bien','Très bien','Excellent'][hovered || form.rating] }}
        </span>
      </div>

      <!-- Textarea -->
      <div class="field">
        <label class="label">Commentaire</label>
        <textarea
          class="input pc__textarea"
          [(ngModel)]="form.content"
          name="content"
          placeholder="Partagez votre expérience..."
          rows="3"
        ></textarea>
      </div>

      <app-alert *ngIf="errorMsg" type="error" [message]="errorMsg" />

      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        <span class="auth-spinner" *ngIf="isLoading"></span>
        <svg *ngIf="!isLoading" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        {{ isLoading ? 'Envoi...' : 'Publier' }}
      </button>
    </form>
  </div>

  <!-- ══ List ══ -->
  <div class="pc__list">

    <div class="pc__empty" *ngIf="comments.length === 0">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Aucun avis pour l'instant.</p>
    </div>

    <div class="pc__comment" *ngFor="let c of comments">
      <img
        class="pc__avatar"
        [src]="c.user.image || getAvatar(c.user.name)"
        [alt]="c.user.name"
      />
      <div class="pc__comment-body">
        <div class="pc__comment-top">
          <span class="pc__comment-name">{{ c.user.name }}</span>
          <div class="pc__stars">
            <svg *ngFor="let s of stars" width="12" height="12" viewBox="0 0 24 24"
              [class]="'pc__star pc__star--' + starFill(s, c.rating)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </div>
          <span class="pc__comment-date">{{ formatDate(c.createdAt) }}</span>
        </div>
        <p class="pc__comment-text">{{ c.content }}</p>
      </div>
    </div>

  </div>

</div>
