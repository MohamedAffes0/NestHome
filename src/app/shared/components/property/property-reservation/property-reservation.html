<div class="pr">

  <!-- ── Header ── -->
  <div class="pr__header">
    <div class="pr__header-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>
    <div>
      <h3 class="pr__title">Réserver une visite</h3>
      <p class="pr__subtitle" *ngIf="propertyTitle">{{ propertyTitle }}</p>
    </div>
  </div>

  <!-- ── Sucess ── -->
  <div class="pr__success" *ngIf="success">
    <div class="pr__success-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h4>Réservation confirmée !</h4>
    <p>Votre visite a été planifiée pour le <strong>{{ formatDate(form.visitDate || '') }}</strong> à <strong>{{ form.visitTime }}</strong>. Un agent vous contactera pour confirmer.</p>
    <button class="btn btn-primary pr__new-btn" type="button" (click)="reset()">
      Faire une autre réservation
    </button>
  </div>

  <!-- ── Not Connected ── -->
  <app-alert *ngIf="!isLoggedIn && !success" type="info" message="Connectez-vous pour réserver une visite." />

  <!-- Info msg -->
  <app-alert *ngIf="infoMsg" type="info" [message]="infoMsg" />

  <!-- ── Form ── -->
  <form class="pr__form" *ngIf="isLoggedIn && !success && !infoMsg" (ngSubmit)="onSubmit()" novalidate>

    <!-- Phone -->
    <div class="field">
      <label class="label">Téléphone</label>
      <div class="input-group">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <input
          class="input"
          type="tel"
          placeholder="+216 XX XXX XXX"
          [(ngModel)]="form.clientPhone"
          name="clientPhone"
          required
        />
      </div>
    </div>

    <!-- CIN / Passeport -->
    <div class="field">
      <label class="label">CIN / Passeport</label>
      <div class="input-group">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <input
          class="input"
          type="text"
          placeholder="12345678"
          [(ngModel)]="form.cinPassport"
          name="cinPassport"
          required
        />
      </div>
    </div>

    <!-- Date -->
    <div class="field">
      <label class="label">Date de visite</label>
      <div class="input-group">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <input
          class="input"
          type="date"
          [(ngModel)]="form.visitDate"
          name="visitDate"
          [min]="minDate"
          required
        />
      </div>
    </div>

    <!-- Time -->
    <div class="field">
      <label class="label">Créneau horaire</label>
      <div class="pr__time-slots">
        <button
          *ngFor="let slot of timeSlots"
          type="button"
          class="pr__slot"
          [class.pr__slot--active]="form.visitTime === slot"
          (click)="form.visitTime = slot"
        >
          {{ slot }}
        </button>
      </div>
    </div>

    <!-- Recap -->
    <app-alert *ngIf="form.visitDate && form.visitTime" type="time" [message]="'Visite le ' + formatDate(form.visitDate) + ' à ' + form.visitTime" /> <!-- Erreur -->

    <!-- Error -->
    <app-alert *ngIf="errorMsg" type="error" [message]="errorMsg" />

    <!-- Submit -->
    <button type="submit" class="btn btn-primary pr__submit" [disabled]="isLoading">
      <span class="auth-spinner" *ngIf="isLoading"></span>
      <svg *ngIf="!isLoading" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      {{ isLoading ? 'Réservation en cours...' : 'Confirmer la visite' }}
    </button>

  </form>

</div>
