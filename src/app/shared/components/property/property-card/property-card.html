<article class="card" [routerLink]="['/real-estate', property.id]">

  <!-- Image -->
  <div class="card__image-wrap">
    <img class="card__image" [src]="mainImage" [alt]="property.title" />

    <span class="card__badge badge" [ngClass]="isSale ? 'badge-sale' : 'badge-rent'">
      {{ statusLabel }}
    </span>

    <span class="card__type-badge">{{ typeLabel }}</span>

    <button
      class="card__favorite"
      [class.card__favorite--active]="isFavorite"
      (click)="toggleFavorite($event)"
      [attr.aria-label]="isFavorite ? 'Retirer des favoris' : 'Ajouter aux favoris'"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
        [attr.fill]="isFavorite ? 'currentColor' : 'none'"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
  </div>

  <!-- Content -->
  <div class="card__content">

    <div class="card__header">
      <h3 class="card__title">{{ property.title }}</h3>
      <p class="card__price">
        {{ property.price | number:'1.0-0' }}
        <span>{{ priceUnit }}</span>
      </p>
    </div>

    <p class="card__location">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      {{ property.address }}
    </p>

    <div class="divider" style="margin-bottom: var(--space-4);"></div>

    <div class="card__features">
      <div class="card__feature">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        {{ property.rooms }} ch.
      </div>
      <div class="card__feature">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16M4 6h16M4 18h7"/></svg>
        {{ property.bathroom }} sdb
      </div>
      <div class="card__feature">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"/><path d="M3 9h18M9 3v18"/></svg>
        {{ property.surface }} m²
      </div>
      <div class="card__feature card__feature--rating">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        {{ property.avgRating > 0 ? property.avgRating.toFixed(1) : 'N/A' }}
      </div>
    </div>

  </div>
</article>
