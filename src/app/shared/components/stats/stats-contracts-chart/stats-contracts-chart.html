<div class="cc-wrap">

  <div class="cc-header">
    <div>
      <h3 class="cc-title">Évolution des contrats</h3>
      <p class="cc-sub">Ventes vs Locations par mois</p>
    </div>
    <div class="cc-summary">
      <div class="cc-summary__item cc-summary__item--sale">
        <span class="cc-summary__val">{{ saleCount }}</span>
        <span class="cc-summary__lbl">Ventes</span>
        <span class="cc-summary__pct">{{ salePct }}%</span>
      </div>
      <div class="cc-summary__sep"></div>
      <div class="cc-summary__item cc-summary__item--rental">
        <span class="cc-summary__val">{{ rentalCount }}</span>
        <span class="cc-summary__lbl">Locations</span>
        <span class="cc-summary__pct">{{ rentalPct }}%</span>
      </div>
    </div>
  </div>

  <div class="cc-canvas-wrap">
    <canvas #contractCanvas></canvas>
  </div>

</div>
