<div class="cdm-overlay" (click)="onOverlayClick()">
  <div class="cdm" (click)="$event.stopPropagation()">

    <div class="cdm__header">
      <h2 class="cdm__title">{{ title }}</h2>
      <button class="cdm__close" type="button" (click)="close.emit()" [disabled]="loading">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="cdm__body">
      <div class="cdm__icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-alert-icon lucide-circle-alert"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
      </div>
      <p class="cdm__msg" [innerHTML]="message"></p>
      <p class="cdm__sub">Cette action est irréversible.</p>
    </div>

    <div class="cdm__footer">
      <button class="btn btn-ghost" type="button" (click)="close.emit()" [disabled]="loading">
        Annuler
      </button>
      <button class="btn-delete" type="button" (click)="confirm.emit()" [disabled]="loading">
        <span class="auth-spinner" *ngIf="loading"></span>
        <svg *ngIf="!loading" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        {{ loading ? 'Suppression…' : confirmLabel }}
      </button>
    </div>

  </div>
</div>
