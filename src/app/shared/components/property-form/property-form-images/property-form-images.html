<div class="pfi">

  <div class="pfi__section">
    <h3 class="pfi__section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Photos du bien
      <span class="pfi__count-badge">{{ items.length }} / {{ maxPhotos }}</span>
    </h3>

    <div class="pfi__body">

      <!-- Drop Zone — masked if limit reached -->
      <label
        *ngIf="canAddMore"
        class="pfi__dropzone"
        [class.pfi__dropzone--active]="dragOver"
        for="imageFileInput"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave()"
        (drop)="onDrop($event)"
      >
        <div class="pfi__dropzone-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p class="pfi__dropzone-text">
          Glissez vos photos ici ou <span class="pfi__dropzone-link">parcourir</span>
        </p>
        <p class="pfi__dropzone-hint">
          JPG, PNG, WebP — 10 Mo max par photo · {{ maxPhotos - items.length }} emplacement(s) restant(s)
        </p>
        <input id="imageFileInput" type="file" accept="image/*" multiple class="pfi__input" (change)="onFileChange($event)" />
      </label>

      <!-- Info message for limit reached -->
      <app-alert *ngIf="maxPhotos" type="info" [message]="'Limite de ' + maxPhotos + ' photos atteinte. Supprimez une photo pour en ajouter une autre.'" />

      <!-- Warning message for ignored files -->
      <app-alert *ngIf="limitMsg" type="warning" [message]="limitMsg" />

      <!-- Preview grid -->
      <div class="pfi__grid" *ngIf="items.length > 0">
        <div
          *ngFor="let item of items; let i = index"
          class="pfi__thumb"
          [class.pfi__thumb--existing]="item.type === 'existing'"
          [class.pfi__thumb--new]="item.type === 'new'"
          [class.pfi__thumb--first]="i === 0"
          draggable="true"
          (dragstart)="onItemDragStart(i)"
          (dragover)="$event.preventDefault()"
          (drop)="onItemDrop(i)"
        >
          <img [src]="item.url" alt="Photo {{ i + 1 }}" class="pfi__thumb-img" />

          <!-- First photo badge -->
          <span *ngIf="i === 0" class="pfi__thumb-badge">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            Principale
          </span>

          <!-- Badge type -->
          <span class="pfi__thumb-type" [class.pfi__thumb-type--new]="item.type === 'new'">
            {{ item.type === 'new' ? 'Nouveau' : 'Existant' }}
          </span>

          <!-- Remove -->
          <button type="button" class="pfi__thumb-remove" (click)="remove(i)" aria-label="Supprimer">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>

          <!-- Drag handle -->
          <div class="pfi__drag-handle" title="Déplacer">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1" fill="currentColor"/><circle cx="15" cy="5" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="19" r="1" fill="currentColor"/><circle cx="15" cy="19" r="1" fill="currentColor"/></svg>
          </div>
        </div>
      </div>

      <p class="pfi__hint" *ngIf="items.length > 0">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        Glissez les photos pour réorganiser. La première sera l'image principale.
      </p>

    </div>
  </div>

</div>
