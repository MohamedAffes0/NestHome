<div class="pw-strength" *ngIf="password">
  <div class="pw-strength__bars">
    <span
      *ngFor="let i of bars"
      class="pw-strength__bar"
      [ngClass]="strength >= i ? 'pw-strength__bar--' + cls : ''"
    ></span>
  </div>
  <span class="pw-strength__label" [ngClass]="'pw-strength__label--' + cls">
    {{ label }}
  </span>
</div>
