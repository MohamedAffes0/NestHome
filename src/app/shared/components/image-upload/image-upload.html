<div class="img-upload">

  <!-- Preview -->
  <div class="img-upload__preview" *ngIf="preview">
    <img class="img-upload__img" [src]="preview" alt="Aperçu" />
    <button class="img-upload__remove" type="button" (click)="clear()" aria-label="Supprimer l'image">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <span class="img-upload__filename" *ngIf="selectedFile">{{ selectedFile.name }}</span>
  </div>

  <!-- Drop zone -->
  <label *ngIf="!preview" class="img-upload__zone" [for]="inputId">
    <div class="img-upload__icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <span class="img-upload__text">Cliquez ou glissez une image ici</span>
    <span class="img-upload__hint">{{ formats }} — {{ maxSize }} max</span>
  </label>

  <input
    [id]="inputId"
    type="file"
    [accept]="accept"
    class="img-upload__input"
    (change)="onFileChange($event)"
  />

</div>
