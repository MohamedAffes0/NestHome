<div class="pr-requirements">

  <div class="pr-req" [class.pr-req--ok]="hasMinLength">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline *ngIf="hasMinLength"  points="20 6 9 17 4 12"/>
      <circle   *ngIf="!hasMinLength" cx="12" cy="12" r="4"/>
    </svg>
    8 caractères minimum
  </div>

  <div class="pr-req" [class.pr-req--ok]="hasUppercase">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline *ngIf="hasUppercase"  points="20 6 9 17 4 12"/>
      <circle   *ngIf="!hasUppercase" cx="12" cy="12" r="4"/>
    </svg>
    Une majuscule
  </div>

  <div class="pr-req" [class.pr-req--ok]="hasDigit">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline *ngIf="hasDigit"  points="20 6 9 17 4 12"/>
      <circle   *ngIf="!hasDigit" cx="12" cy="12" r="4"/>
    </svg>
    Un chiffre
  </div>

</div>
